data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_file: "train.csv"
  test_file: "test.csv"
  stores_file: "stores.csv"
  oil_file: "oil.csv"
  holidays_file: "holidays_events.csv"
  transactions_file: "transactions.csv"
  submission_file: "sample_submission.csv"

features:
  lag_days: [1, 7, 14, 21, 28, 35, 42]
  rolling_windows: [7, 14, 28]
  rolling_aggs: ["mean", "std", "max", "min"]
  target_col: "sales"
  date_col: "date"
  id_cols: ["store_nbr", "family"]

validation:
  n_splits: 5
  gap_days: 16          # prediction horizon matches test set gap
  test_days: 16         # each fold tests on 16-day horizon

model:
  lgbm:
    n_estimators: 2000
    learning_rate: 0.05
    num_leaves: 127
    min_child_samples: 20
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    reg_alpha: 0.1
    reg_lambda: 0.1
    random_state: 42
    n_jobs: -1
    verbose: -1
  early_stopping_rounds: 50

submission:
  output_dir: "submissions"
